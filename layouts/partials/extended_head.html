{{ if or .IsHome (eq .Section "lab") (eq .Section "metrics") (eq .Section "posts") (eq .Section "about") .IsPage }}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f5f1e8;
    --panel: #fbf8f2;
    --line: #d8d0c3;
    --ink: #1e2430;
    --muted: #5b6472;
    --accent: #8b5a2b;
    --accent-soft: #ede1d2;
    --max-width: 1120px;
  }

  body.home-remix,
  body.section-remix,
  body.article-remix,
  body:has(.home-shell),
  body:has(.section-shell),
  body:has(.article-shell) {
    background: var(--paper);
    color: var(--ink);
  }

  body.home-remix #sideContainer,
  body.home-remix #extraContainer,
  body.section-remix #sideContainer,
  body.section-remix #extraContainer,
  body.article-remix #sideContainer,
  body.article-remix #extraContainer,
  body:has(.home-shell) #sideContainer,
  body:has(.home-shell) #extraContainer,
  body:has(.section-shell) #sideContainer,
  body:has(.section-shell) #extraContainer,
  body:has(.article-shell) #sideContainer,
  body:has(.article-shell) #extraContainer {
    display: none !important;
  }

  body.home-remix #content,
  body.section-remix #content,
  body.article-remix #content,
  body:has(.home-shell) #content,
  body:has(.section-shell) #content,
  body:has(.article-shell) #content {
    background: transparent;
  }

  body.home-remix .stream-container,
  body.section-remix .stream-container,
  body.article-remix .stream-container,
  body:has(.home-shell) .stream-container,
  body:has(.section-shell) .stream-container,
  body:has(.article-shell) .stream-container {
    max-width: 100%;
    padding-left: 0 !important;
    padding-right: 0 !important;
  }

  .home-shell,
  .section-shell,
  .article-shell {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 42px 28px 72px;
  }

  .home-shell *,
  .section-shell *,
  .article-shell * {
    box-sizing: border-box;
    font-family: "IBM Plex Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .home-shell a,
  .section-shell a,
  .article-shell a {
    color: inherit;
  }

  .eyebrow,
  .writing-date,
  .article-meta {
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .home-title,
  .section-title,
  .article-title,
  .section-heading h2,
  .card-title,
  .writing-title,
  .note-title,
  .article-page-title,
  .metrics-title {
    font-family: "Source Serif 4", Georgia, serif;
    letter-spacing: -0.03em;
    color: var(--ink);
  }

  .home-title {
    margin: 16px 0 18px;
    font-size: clamp(42px, 6vw, 72px);
    line-height: 0.98;
    max-width: 10ch;
  }

  .home-lead,
  .section-lead,
  .card-copy,
  .writing-summary,
  .signal-copy,
  .note-block p,
  .plain-item p,
  .article-lead,
  .article-content,
  .metrics-summary,
  .metrics-status,
  .manifesto-copy {
    font-size: 17px;
    line-height: 1.8;
    color: var(--muted);
  }

  .home-intro,
  .home-grid,
  .metrics-page-grid,
  .card-grid,
  .article-pagination {
    display: grid;
    gap: 22px;
  }

  .home-intro,
  .home-grid,
  .metrics-page-grid {
    grid-template-columns: minmax(0, 1.35fr) minmax(300px, 0.85fr);
  }

  .home-grid.secondary {
    margin-top: 22px;
  }

  .home-primary {
    padding-right: 28px;
  }

  .home-actions,
  .signal-meta {
    display: flex;
    gap: 18px;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 24px;
  }

  .text-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding-bottom: 2px;
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color .15s ease;
  }

  .text-link:hover {
    border-color: var(--accent);
  }

  .home-note,
  .content-panel,
  .section-panel,
  .card-panel,
  .metrics-card,
  .article-frame {
    background: var(--panel);
    border: 1px solid var(--line);
  }

  .home-note,
  .content-panel,
  .section-panel,
  .card-panel,
  .metrics-card {
    padding: 24px;
  }

  .home-note {
    display: grid;
    gap: 18px;
    align-content: start;
  }

  .note-block + .note-block,
  .plain-item + .plain-item,
  .signal-stat + .signal-stat {
    border-top: 1px solid var(--line);
    padding-top: 16px;
  }

  .note-title,
  .card-title,
  .section-heading h2,
  .panel-title,
  .metrics-title {
    margin: 8px 0 10px;
    font-size: clamp(28px, 3vw, 38px);
    line-height: 1.08;
  }

  .section-heading {
    margin-bottom: 18px;
  }

  .writing-list,
  .stack-list,
  .plain-list,
  .manifesto-list,
  .now-stack,
  .experiment-cards {
    display: grid;
    gap: 0;
  }

  .panel-kicker,
  .now-label {
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .writing-row,
  .stack-card,
  .plain-item,
  .manifesto-item,
  .now-block,
  .experiment-card {
    padding: 18px 0;
    text-decoration: none !important;
    border-top: 1px solid var(--line);
  }

  .writing-row:first-child,
  .stack-card:first-child,
  .plain-item:first-child,
  .manifesto-item:first-child,
  .now-block:first-child,
  .experiment-card:first-child {
    border-top: 0;
    padding-top: 0;
  }

  .writing-row {
    display: grid;
    grid-template-columns: 124px minmax(0, 1fr);
    gap: 20px;
    align-items: start;
  }

  .writing-title,
  .stack-title,
  .plain-title,
  .manifesto-title,
  .now-value {
    font-size: 24px;
    line-height: 1.2;
  }

  .manifesto-item {
    display: grid;
    grid-template-columns: 40px minmax(0, 1fr);
    gap: 16px;
  }

  .manifesto-index {
    font-family: "IBM Plex Mono", monospace;
    font-size: 14px;
    color: var(--accent);
    padding-top: 4px;
  }

  .stack-copy,
  .plain-item p,
  .manifesto-copy,
  .now-copy {
    margin: 8px 0 0;
  }

  .writing-row:hover .writing-title,
  .stack-card:hover .stack-title,
  .article-page-link:hover .article-page-title,
  .text-link:hover {
    color: var(--accent);
  }

  .signal-panel {
    align-content: start;
  }

  .signal-stats {
    display: grid;
    gap: 0;
    margin-top: 18px;
  }

  .signal-stat {
    display: flex;
    justify-content: space-between;
    gap: 18px;
    align-items: baseline;
    padding: 16px 0;
  }

  .signal-stat span,
  .metrics-pill,
  .metric-label,
  .metrics-meta,
  .metrics-bars-head,
  .panel-link,
  .metrics-bar-label,
  .metrics-bar-value,
  .metrics-status {
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .signal-stat strong,
  .metric-value {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.03em;
    color: var(--ink);
  }

  .section-hero {
    margin-bottom: 26px;
  }

  .section-title {
    margin: 10px 0 16px;
    font-size: clamp(40px, 5.6vw, 68px);
    line-height: 0.98;
    max-width: 12ch;
  }

  .card-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    margin-bottom: 22px;
  }

  .card-panel-wide,
  .metrics-card.wide {
    grid-column: 1 / -1;
  }

  .bullet-list {
    margin: 16px 0 0;
    padding-left: 20px;
    color: var(--muted);
    line-height: 1.8;
  }

  .metrics-card {
    background: #f8f5ef;
  }

  .metrics-card-top,
  .metrics-bars-head {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: baseline;
  }

  .metrics-pill {
    padding: 4px 0;
    color: var(--accent);
  }

  .metrics-summary {
    margin: 12px 0 18px;
  }

  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .metric-box {
    padding: 16px;
    background: #fffdf9;
    border: 1px solid var(--line);
  }

  .metric-box.accent {
    background: var(--accent-soft);
  }

  .metrics-meta {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }

  .metrics-bars {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(72px, 1fr));
    align-items: end;
    gap: 10px;
    min-height: 168px;
    margin-top: 16px;
  }

  .metrics-bar-column {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
  }

  .metrics-bar-shape {
    width: 100%;
    max-width: 48px;
    border-radius: 999px 999px 0 0;
    background: linear-gradient(180deg, #c9b8a2 0%, #8b5a2b 100%);
  }

  .usage-empty {
    align-self: center;
    color: var(--muted);
    font-size: 14px;
  }

  .article-shell {
    max-width: 860px;
  }

  .article-frame {
    padding: 34px 30px 28px;
  }

  .article-title {
    margin: 12px 0 16px;
    font-size: clamp(38px, 5vw, 62px);
    line-height: 1;
  }

  .article-meta {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 14px;
  }

  .article-body {
    margin-top: 26px;
    padding-top: 26px;
    border-top: 1px solid var(--line);
  }

  .article-content {
    color: var(--ink);
  }

  .article-content h2,
  .article-content h3,
  .article-content h4 {
    font-family: "Source Serif 4", Georgia, serif;
    letter-spacing: -0.03em;
    color: var(--ink);
  }

  .article-content pre,
  .article-content code {
    font-family: "IBM Plex Mono", monospace;
  }

  .article-pagination {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    margin-top: 30px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
  }

  .article-page-link {
    display: block;
    padding: 18px;
    border: 1px solid var(--line);
    background: #fffdf9;
    text-decoration: none !important;
  }

  .article-page-link.muted {
    color: var(--muted);
  }

  .article-comments {
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
  }

  @media (max-width: 900px) {
    .home-intro,
    .home-grid,
    .metrics-page-grid,
    .card-grid,
    .article-pagination {
      grid-template-columns: 1fr;
    }

    .home-primary {
      padding-right: 0;
    }

    .writing-row {
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .metrics-grid {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 640px) {
    .home-shell,
    .section-shell,
    .article-shell {
      padding: 28px 18px 48px;
    }

    .home-actions,
    .signal-meta {
      gap: 12px;
    }

    .article-frame,
    .home-note,
    .content-panel,
    .card-panel,
    .metrics-card {
      padding: 18px;
    }
  }
</style>
{{ end }}
