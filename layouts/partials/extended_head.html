{{ if .IsHome }}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  body.home-remix,
  body:has(.home-shell) {
    background:
      radial-gradient(circle at top left, rgba(240, 116, 80, 0.14), transparent 28%),
      radial-gradient(circle at top right, rgba(25, 118, 210, 0.18), transparent 32%),
      linear-gradient(180deg, #f8f4ec 0%, #fbfaf7 52%, #eef4fb 100%);
  }

  body.home-remix #sideContainer,
  body.home-remix #extraContainer,
  body:has(.home-shell) #sideContainer,
  body:has(.home-shell) #extraContainer {
    display: none !important;
  }

  body.home-remix #content,
  body:has(.home-shell) #content {
    background: transparent;
  }

  body.home-remix .stream-container,
  body:has(.home-shell) .stream-container {
    padding-left: 0 !important;
    padding-right: 0 !important;
    max-width: 100%;
  }

  .home-shell {
    padding: 32px 40px 56px;
  }

  .home-shell * {
    font-family: "Space Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .hero-stage {
    display: grid;
    grid-template-columns: minmax(0, 1.2fr) minmax(360px, 0.8fr);
    gap: 22px;
    align-items: stretch;
  }

  .hero-copy,
  .metrics-card,
  .feature-panel,
  .column-panel {
    position: relative;
    overflow: hidden;
    border-radius: 30px;
    border: 1px solid rgba(15, 30, 52, 0.08);
    box-shadow: 0 26px 80px rgba(15, 30, 52, 0.08);
  }

  .hero-copy {
    padding: 42px;
    background:
      linear-gradient(145deg, rgba(255, 255, 255, 0.96), rgba(255, 245, 240, 0.96)),
      #fff;
  }

  .hero-copy::before {
    content: "liaohch3";
    position: absolute;
    top: -4px;
    right: 22px;
    font-family: "Instrument Serif", serif;
    font-size: clamp(72px, 12vw, 144px);
    line-height: 0.9;
    letter-spacing: -0.06em;
    color: rgba(15, 30, 52, 0.05);
    pointer-events: none;
  }

  .hero-kicker,
  .panel-kicker,
  .metrics-kicker,
  .metrics-pill,
  .metric-label,
  .now-label,
  .writing-date,
  .signal-ribbon-label {
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    opacity: 0.7;
  }

  .hero-title {
    position: relative;
    z-index: 1;
    margin: 22px 0 18px;
    max-width: 9.4em;
    font-size: clamp(54px, 7vw, 92px);
    line-height: 0.9;
    letter-spacing: -0.065em;
  }

  .hero-title span {
    display: block;
    max-width: 8.8em;
    margin-top: 14px;
    font-family: "Instrument Serif", serif;
    font-size: clamp(28px, 3vw, 42px);
    line-height: 1.05;
    letter-spacing: -0.04em;
    color: #28415e;
  }

  .hero-lead,
  .panel-copy,
  .experiment-copy,
  .writing-summary,
  .now-copy,
  .metrics-summary,
  .metrics-status {
    font-size: 17px;
    line-height: 1.72;
    opacity: 0.82;
  }

  .hero-actions {
    display: flex;
    gap: 12px;
    margin: 28px 0 24px;
    flex-wrap: wrap;
  }

  .hero-action {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 48px;
    padding: 0 18px;
    border-radius: 999px;
    border: 1px solid rgba(18, 56, 88, 0.14);
    background: rgba(255, 255, 255, 0.72);
    color: #123858;
    text-decoration: none !important;
    transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }

  .hero-action:hover {
    transform: translateY(-1px);
    box-shadow: 0 18px 32px rgba(18, 56, 88, 0.12);
    border-color: rgba(18, 56, 88, 0.24);
  }

  .hero-action-primary {
    background: linear-gradient(135deg, #102a43, #1976d2);
    border-color: transparent;
    color: #fff;
  }

  .hero-notes {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
  }

  .hero-note {
    padding: 16px 16px 18px;
    border-radius: 18px;
    background: rgba(16, 42, 67, 0.04);
  }

  .hero-note-title,
  .metrics-title,
  .panel-title,
  .experiment-title,
  .writing-title {
    line-height: 1.08;
    letter-spacing: -0.04em;
  }

  .hero-note-title {
    margin-bottom: 10px;
    font-size: 18px;
  }

  .hero-note-copy {
    font-size: 14px;
    line-height: 1.6;
    opacity: 0.78;
  }

  .metrics-card {
    padding: 28px;
    background:
      radial-gradient(circle at top right, rgba(25, 118, 210, 0.22), transparent 36%),
      linear-gradient(180deg, rgba(251, 252, 255, 0.98), rgba(238, 245, 255, 0.98));
  }

  .metrics-card-top,
  .panel-topline,
  .metrics-bars-head {
    display: flex;
    justify-content: space-between;
    gap: 14px;
    align-items: baseline;
  }

  .metrics-title,
  .panel-title {
    margin-top: 8px;
    font-size: clamp(28px, 3vw, 40px);
  }

  .metrics-pill {
    padding: 8px 12px;
    border-radius: 999px;
    background: rgba(15, 30, 52, 0.08);
  }

  .metrics-summary {
    margin: 14px 0 18px;
  }

  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }

  .metric-box {
    padding: 16px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.76);
    border: 1px solid rgba(18, 56, 88, 0.1);
  }

  .metric-box.accent {
    background: linear-gradient(135deg, #102a43, #1976d2);
  }

  .metric-box.accent .metric-label,
  .metric-box.accent .metric-value {
    color: #fff !important;
    opacity: 1;
  }

  .metric-value {
    margin-top: 10px;
    font-size: 30px;
    line-height: 1;
    letter-spacing: -0.05em;
  }

  .metrics-meta,
  .metrics-bars-head,
  .panel-link {
    margin-top: 16px;
    font-size: 13px;
    opacity: 0.72;
  }

  .metrics-bars {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(76px, 1fr));
    gap: 10px;
    align-items: end;
    min-height: 196px;
    margin-top: 14px;
  }

  .metrics-bar-column {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .metrics-bar-shape {
    width: 100%;
    max-width: 56px;
    border-radius: 18px 18px 6px 6px;
    background: linear-gradient(180deg, #f07450, #1976d2);
    box-shadow: 0 18px 34px rgba(25, 118, 210, 0.18);
  }

  .metrics-bar-value,
  .metrics-bar-label,
  .metrics-status {
    font-size: 12px;
    text-align: center;
  }

  .metrics-status {
    margin-top: 14px;
    text-align: left;
  }

  .signal-ribbon {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 18px;
    align-items: center;
    margin: 18px 0;
    padding: 16px 20px;
    border-radius: 22px;
    background: rgba(15, 30, 52, 0.05);
    border: 1px solid rgba(15, 30, 52, 0.06);
  }

  .signal-ribbon-track {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .signal-ribbon-track span {
    display: inline-flex;
    align-items: center;
    min-height: 34px;
    padding: 0 12px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.72);
    border: 1px solid rgba(15, 30, 52, 0.08);
    font-size: 14px;
  }

  .feature-grid,
  .home-columns {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(320px, 0.9fr);
    gap: 20px;
    margin-top: 20px;
  }

  .feature-panel,
  .column-panel {
    padding: 28px;
    background: rgba(255, 255, 255, 0.84);
  }

  .manifesto-list,
  .writing-list,
  .now-stack {
    display: grid;
    gap: 12px;
    margin-top: 18px;
  }

  .manifesto-item,
  .now-block {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 14px;
    padding: 16px;
    border-radius: 18px;
    background: rgba(16, 42, 67, 0.04);
  }

  .manifesto-index {
    font-size: 20px;
    line-height: 1;
    letter-spacing: -0.05em;
    color: #1976d2;
  }

  .manifesto-title,
  .experiment-title,
  .writing-title,
  .now-value {
    font-size: 24px;
  }

  .manifesto-copy,
  .experiment-copy,
  .now-copy {
    margin-top: 8px;
    font-size: 15px;
    line-height: 1.68;
    opacity: 0.8;
  }

  .experiment-cards {
    display: grid;
    gap: 14px;
    margin-top: 18px;
  }

  .experiment-card,
  .writing-row {
    display: grid;
    gap: 10px;
    padding: 18px;
    border-radius: 20px;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(245, 248, 252, 0.96));
    border: 1px solid rgba(15, 30, 52, 0.08);
    text-decoration: none !important;
    transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }

  .experiment-card:hover,
  .writing-row:hover {
    transform: translateY(-2px);
    box-shadow: 0 18px 36px rgba(15, 30, 52, 0.1);
    border-color: rgba(25, 118, 210, 0.2);
  }

  .writing-row {
    grid-template-columns: 112px 1fr;
    align-items: start;
  }

  .writing-date {
    padding-top: 6px;
  }

  .panel-link {
    text-decoration: none !important;
  }

  .now-block {
    grid-template-columns: 1fr;
  }

  .now-value.compact {
    font-size: 18px;
    line-height: 1.6;
  }

  .usage-empty {
    align-self: center;
    font-size: 13px;
    opacity: 0.72;
  }

  @media screen and (max-width: 1280px) {
    .hero-stage,
    .feature-grid,
    .home-columns {
      grid-template-columns: minmax(0, 1fr);
    }
  }

  @media screen and (max-width: 1020px) {
    .home-shell {
      padding: 18px 0 30px;
    }

    .hero-copy,
    .metrics-card,
    .feature-panel,
    .column-panel {
      border-radius: 22px;
    }

    .hero-copy {
      padding: 26px 20px 22px;
    }

    .metrics-card,
    .feature-panel,
    .column-panel {
      padding: 22px 18px;
    }

    .hero-notes,
    .metrics-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media screen and (max-width: 700px) {
    .hero-notes,
    .metrics-grid,
    .writing-row,
    .signal-ribbon {
      grid-template-columns: minmax(0, 1fr);
    }

    .hero-title {
      font-size: 42px;
    }

    .hero-title span {
      font-size: 24px;
    }

    .metric-value,
    .now-value,
    .manifesto-title,
    .experiment-title,
    .writing-title {
      font-size: 22px;
    }
  }

  body.night.home-remix,
  body.night:has(.home-shell) {
    background:
      radial-gradient(circle at top left, rgba(240, 116, 80, 0.12), transparent 28%),
      radial-gradient(circle at top right, rgba(55, 143, 231, 0.18), transparent 32%),
      linear-gradient(180deg, #171717 0%, #1d2025 48%, #12161a 100%);
  }

  body.night .hero-copy,
  body.night .metrics-card,
  body.night .feature-panel,
  body.night .column-panel,
  body.night .signal-ribbon,
  body.night .hero-note,
  body.night .manifesto-item,
  body.night .now-block,
  body.night .metric-box,
  body.night .experiment-card,
  body.night .writing-row,
  body.night .signal-ribbon-track span {
    background-color: rgba(36, 36, 36, 0.9);
    border-color: rgba(146, 194, 242, 0.12);
    box-shadow: none;
  }

  body.night .hero-copy {
    background:
      linear-gradient(145deg, rgba(29, 32, 37, 0.98), rgba(47, 34, 31, 0.94)),
      #202020;
  }

  body.night .hero-copy::before {
    color: rgba(255, 255, 255, 0.04);
  }

  body.night .metrics-card {
    background:
      radial-gradient(circle at top right, rgba(55, 143, 231, 0.2), transparent 36%),
      linear-gradient(180deg, rgba(24, 28, 34, 0.98), rgba(20, 24, 29, 0.98));
  }

  body.night .hero-action {
    background: rgba(255, 255, 255, 0.04);
    border-color: rgba(146, 194, 242, 0.16);
    color: #e6e6e6;
  }

  body.night .hero-action-primary {
    background: linear-gradient(135deg, #f07450, #378fe7);
    color: #fff;
  }

  body.night .metrics-bar-shape {
    background: linear-gradient(180deg, #f07450, #378fe7);
    box-shadow: 0 18px 34px rgba(55, 143, 231, 0.16);
  }
</style>
{{ end }}
